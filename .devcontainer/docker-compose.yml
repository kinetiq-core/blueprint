services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    volumes:
      # Mount the WSL-host kinetiq-core parent so sibling repo references use
      # the same relative paths inside and outside the optional container.
      # REQUIRES this repo to live at kinetiq-core/<stack>/ on host.
      - ../..:/workspaces/kinetiq-core:cached
